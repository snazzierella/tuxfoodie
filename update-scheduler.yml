name: Monthly Restaurant Directory Update

on:
  schedule:
    # Run at midnight UTC on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:
    # Allow manual triggering via GitHub Actions tab

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run restaurant update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/update-data.ts

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data.ts
          if git diff --staged --quiet; then
            echo "No changes in restaurant directory."
          else
            git commit -m "chore: auto-update restaurant directory from OSM [skip ci]"
            git push
          fi
